name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Maven Builds für jeden Unterordner
    - name: Build All Services with Maven
      run: |
        mvn clean package -DskipTests -f shopfront/pom.xml
        mvn clean package -DskipTests -f productcatalogue/pom.xml
        mvn clean package -DskipTests -f stockmanager/pom.xml

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Docker Build & Push für Shopfront
    - name: Build and push Shopfront Image
      uses: docker/build-push-action@v4
      with:
        context: ./shopfront
        push: true
        tags: js2021s/shopfront:latest

    # Docker Build & Push für Product Catalogue
    - name: Build and push Product Catalogue Image
      uses: docker/build-push-action@v4
      with:
        context: ./productcatalogue
        push: true
        tags: js2021s/productcatalogue:latest

    # Docker Build & Push für Stock Manager
    - name: Build and push Stock Manager Image
      uses: docker/build-push-action@v4
      with:
        context: ./stockmanager
        push: true
        tags: js2021s/stockmanager:latest
